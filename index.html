<!-- =================================================================
     お問い合わせフォーム 修正版
     GitHub Pages用 / FormSubmit利用
     使い方：既存の <section id="contact">...</section> と、末尾の二重送信防止<script>をこの内容に差し替え
================================================================== -->
<section id="contact" class="py-20 bg-white">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <div class="text-center mb-12 space-y-4">
            <span class="text-brand-gold font-bold tracking-widest text-xs uppercase block">CONTACT</span>
            <h2 class="font-serif text-3xl font-bold text-brand-navy">
                ご相談・お問い合わせ
            </h2>
            <p class="text-sm text-brand-dark/80">
                サロン診断、経営改善のご相談、料金プランのお問い合わせなど、お気軽にお送りください。
            </p>
        </div>

        <div class="bg-brand-beige/30 p-8 sm:p-10 rounded-3xl border border-brand-accent/50 shadow-sm">
            <form id="contact-form" class="space-y-6" action="https://formsubmit.co/consul.will.next@gmail.com" method="POST">
                
                <!-- FormSubmit設定 -->
                <input type="hidden" name="_subject" value="【WILL NEXT】ホームページから新規お問い合わせが届きました">
                <input type="hidden" name="_template" value="table">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_next" value="https://will-next1.github.io/will-next/">
                <input type="hidden" name="_autoresponse" value="お問い合わせありがとうございます。ウィルネクスト合同会社です。内容を確認のうえ、通常1〜2営業日以内にご連絡いたします。">

                <!-- 迷惑送信対策：人間には見えない入力欄 -->
                <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-brand-navy" for="salon_name">サロン名・お名前</label>
                        <input
                            type="text"
                            id="salon_name"
                            name="サロン名・お名前"
                            required
                            class="w-full px-4 py-3 rounded-lg border border-brand-accent focus:outline-none focus:border-brand-gold bg-white text-sm shadow-inner"
                            placeholder="例：ネイルサロン カナモ"
                        >
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-brand-navy" for="email">メールアドレス</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            required
                            class="w-full px-4 py-3 rounded-lg border border-brand-accent focus:outline-none focus:border-brand-gold bg-white text-sm shadow-inner"
                            placeholder="例：name@example.com"
                        >
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-brand-navy" for="tel">電話番号</label>
                    <input
                        type="tel"
                        id="tel"
                        name="電話番号"
                        class="w-full px-4 py-3 rounded-lg border border-brand-accent focus:outline-none focus:border-brand-gold bg-white text-sm shadow-inner"
                        placeholder="例：090-0000-0000"
                    >
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-brand-navy" for="plan">ご希望のメニュー・プラン</label>
                    <select
                        id="plan"
                        name="ご希望のメニュー・プラン"
                        class="w-full px-4 py-3 rounded-lg border border-brand-accent focus:outline-none focus:border-brand-gold bg-white text-sm shadow-inner"
                    >
                        <option value="初回相談">初回相談（11,000円）</option>
                        <option value="サロン診断">サロン診断（55,000円）</option>
                        <option value="月額ライト">月額ライト（27,500円/月）</option>
                        <option value="月額スタンダード">月額スタンダード（55,000円/月）</option>
                        <option value="月額プレミアム">月額プレミアム（110,000円/月）</option>
                        <option value="開業伴走プラン">開業伴走プラン（330,000円）</option>
                        <option value="WEB・販促物制作の相談">WEB・販促物制作の相談</option>
                        <option value="その他・質問">その他・質問</option>
                    </select>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-brand-navy" for="message">ご相談内容・メッセージ</label>
                    <textarea
                        id="message"
                        name="ご相談内容・メッセージ"
                        rows="5"
                        required
                        class="w-full px-4 py-3 rounded-lg border border-brand-accent focus:outline-none focus:border-brand-gold bg-white text-sm shadow-inner"
                        placeholder="現状のサロンのお悩みやご相談事項、日程候補などがあればご自由に入力してください。"
                    ></textarea>
                </div>

                <p class="text-xs text-brand-dark/60 leading-relaxed text-center">
                    送信後、確認画面または完了画面に移動します。初回のみFormSubmitの確認メールが管理者宛に届く場合があります。
                </p>

                <div class="text-center pt-4">
                    <button
                        type="submit"
                        id="submit-btn"
                        class="inline-flex items-center justify-center px-12 py-4 rounded-full text-sm font-bold tracking-widest text-white bg-brand-navy hover:bg-brand-gold transition-all duration-300 shadow-md min-w-[240px]"
                    >
                        <span id="btn-text">この内容で送信する</span>
                    </button>
                </div>

            </form>
        </div>

    </div>
</section>

<!-- 二重送信防止処理 -->
<script>
    const form = document.getElementById('contact-form');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');

    if (form && submitBtn && btnText) {
        form.addEventListener('submit', function () {
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
            btnText.textContent = '送信中...';
        });
    }
</script>
