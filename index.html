<form id="contact-form" class="space-y-6" action="https://formsubmit.co/consul.will.next@gmail.com" method="POST">
    <input type="hidden" name="_subject" value="WILL NEXT LPからお問い合わせが届きました">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_captcha" value="false">
    <input type="text" name="_honey" class="hidden" tabindex="-1" autocomplete="off">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-1.5">
            <label class="text-xs font-bold text-brand-navy" for="salon_name">サロン名・お名前</label>
            <input
                type="text"
                id="salon_name"
                name="サロン名・お名前"
                required
                class="w-full px-4 py-3 rounded-lg border border-brand-accent focus:outline-none focus:border-brand-gold bg-brand-beige/50 text-sm"
                placeholder="例：ネイルサロン カナモ"
            >
        </div>

        <div class="space-y-1.5">
            <label class="text-xs font-bold text-brand-navy" for="email">メールアドレス</label>
            <input
                type="email"
                id="email"
                name="email"
                required
                class="w-full px-4 py-3 rounded-lg border border-brand-accent focus:outline-none focus:border-brand-gold bg-brand-beige/50 text-sm"
                placeholder="例：name@example.com"
            >
        </div>
    </div>

    <div class="space-y-1.5">
        <label class="text-xs font-bold text-brand-navy" for="plan">ご希望のメニュー・プラン</label>
        <select
            id="plan"
            name="ご希望のメニュー・プラン"
            class="w-full px-4 py-3 rounded-lg border border-brand-accent focus:outline-none focus:border-brand-gold bg-brand-beige/50 text-sm"
        >
            <option value="初回相談">初回相談 (11,000円)</option>
            <option value="サロン診断">サロン診断 (55,000円)</option>
            <option value="月額ライト">月額ライト (27,500円/月)</option>
            <option value="月額スタンダード">月額スタンダード (55,000円/月)</option>
            <option value="月額プレミアム">月額プレミアム (110,000円/月)</option>
            <option value="開業伴走プラン">開業伴走プラン (330,000円)</option>
            <option value="その他">その他（お見積り・ご質問など）</option>
        </select>
    </div>

    <div class="space-y-1.5">
        <label class="text-xs font-bold text-brand-navy" for="message">ご相談内容・メッセージ</label>
        <textarea
            id="message"
            name="ご相談内容・メッセージ"
            rows="5"
            required
            class="w-full px-4 py-3 rounded-lg border border-brand-accent focus:outline-none focus:border-brand-gold bg-brand-beige/50 text-sm"
            placeholder="現状のサロンのお悩みやご相談事項、日程候補などがあればご自由に入力してください。"
        ></textarea>
    </div>

    <div class="text-center pt-4">
        <button
            type="submit"
            class="inline-flex items-center justify-center px-12 py-4 rounded-full text-sm font-bold tracking-widest text-white bg-brand-navy hover:bg-brand-gold transition-all duration-300 shadow-md"
        >
            この内容で送信する
        </button>
    </div>
</form>

<script>
    document.getElementById('contact-form').addEventListener('submit', function () {
        const button = this.querySelector('button[type="submit"]');
        if (!button) return;

        button.disabled = true;
        button.textContent = '送信中...';
        button.classList.add('opacity-70', 'cursor-not-allowed');
    });
</script>
